<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심(Sim) 게임 - 무승부 없는 수학 게임</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }
        h1 { margin-bottom: 5px; color: #f1c40f; }
        .instructions {
            background-color: #34495e;
            padding: 15px;
            border-radius: 8px;
            max-width: 500px;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .status-box {
            background-color: #e74c3c; /* 기본 플레이어 1 색상 */
            color: white;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .p1-turn { background-color: #e74c3c; } /* 빨강 */
        .p2-turn { background-color: #3498db; } /* 파랑 */
        .game-over { background-color: #95a5a6; color: #2c3e50; }

        .game-container {
            position: relative;
            width: 350px;
            height: 350px;
            background-color: #ecf0f1;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            touch-action: none;
        }

        /* SVG 선 그리기 영역 */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 선은 터치 안 되게 */
        }
        line {
            stroke-width: 6;
            stroke-linecap: round;
            transition: stroke 0.3s;
        }
        .line-p1 { stroke: #e74c3c; }
        .line-p2 { stroke: #3498db; }

        /* 점(Node) 스타일 */
        .node {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #2c3e50;
            border: 4px solid #ecf0f1;
            border-radius: 50%;
            transform: translate(-50%, -50%); /* 중심점 정렬 */
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            transition: transform 0.2s, background-color 0.2s;
        }
        .node.selected {
            background-color: #f1c40f;
            transform: translate(-50%, -50%) scale(1.3);
            border-color: #2c3e50;
        }

        .btn-reset {
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            background-color: #f1c40f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-reset:hover { background-color: #f39c12; }
    </style>
</head>
<body>

    <h1>🕸️ 심(Sim) 게임</h1>
    <div class="instructions">
        <strong>[규칙]</strong> 두 점을 터치하여 선을 긋습니다.<br>
        자신의 색깔(빨강 또는 파랑)로 <strong>'삼각형'을 먼저 만들어 버리는 사람이 패배</strong>합니다!<br>
        수학적으로 무승부가 나올 수 없는 게임입니다.
    </div>

    <div id="statusBox" class="status-box p1-turn">🔴 플레이어 1 차례</div>

    <div class="game-container" id="gameContainer">
        <svg id="svgLayer"></svg>
        </div>

    <button class="btn-reset" onclick="initGame()">게임 다시 시작</button>

    <script>
        const NODE_COUNT = 6;
        const RADIUS = 140; // 원의 반지름
        const CENTER = 175; // 컨테이너 중심 (350/2)
        
        let nodes = [];
        let edges = {}; // "0-1": 1(p1) 또는 2(p2)
        let selectedNode = null;
        let currentPlayer = 1;
        let gameOver = false;

        const gameContainer = document.getElementById('gameContainer');
        const svgLayer = document.getElementById('svgLayer');
        const statusBox = document.getElementById('statusBox');

        function initGame() {
            // 초기화
            svgLayer.innerHTML = '';
            edges = {};
            selectedNode = null;
            currentPlayer = 1;
            gameOver = false;
            updateStatus();

            // 점이 없다면 생성
            if (nodes.length === 0) {
                createNodes();
            } else {
                nodes.forEach(n => n.classList.remove('selected'));
            }
        }

        function createNodes() {
            for (let i = 0; i < NODE_COUNT; i++) {
                const angle = (i * 2 * Math.PI) / NODE_COUNT - Math.PI / 2; // 위쪽부터 시작
                const x = CENTER + RADIUS * Math.cos(angle);
                const y = CENTER + RADIUS * Math.sin(angle);

                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                node.innerText = i + 1;
                
                // 터치 이벤트
                node.onclick = () => handleNodeClick(i, x, y);
                
                gameContainer.appendChild(node);
                nodes.push({ el: node, x, y, id: i });
            }
        }

        function handleNodeClick(id, x, y) {
            if (gameOver) return;

            if (selectedNode === null) {
                // 첫 번째 점 선택
                selectedNode = id;
                nodes[id].el.classList.add('selected');
            } else {
                if (selectedNode === id) {
                    // 같은 점 다시 누르면 취소
                    nodes[id].el.classList.remove('selected');
                    selectedNode = null;
                    return;
                }

                // 두 번째 점 선택하여 선 긋기
                const edgeKey = getEdgeKey(selectedNode, id);
                
                if (edges[edgeKey]) {
                    // 이미 선이 그어진 경우 무시
                    nodes[selectedNode].el.classList.remove('selected');
                    selectedNode = null;
                    return;
                }

                // 선 그리기 실행
                drawLine(selectedNode, id, edgeKey);
                nodes[selectedNode].el.classList.remove('selected');
                selectedNode = null;
            }
        }

        function getEdgeKey(a, b) {
            return Math.min(a, b) + "-" + Math.max(a, b);
        }

        function drawLine(nodeA, nodeB, edgeKey) {
            edges[edgeKey] = currentPlayer;

            const nA = nodes[nodeA];
            const nB = nodes[nodeB];

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', nA.x);
            line.setAttribute('y1', nA.y);
            line.setAttribute('x2', nB.x);
            line.setAttribute('y2', nB.y);
            line.setAttribute('class', currentPlayer === 1 ? 'line-p1' : 'line-p2');
            
            svgLayer.appendChild(line);

            checkTriangle(currentPlayer);
        }

        function checkTriangle(player) {
            // 해당 플레이어가 그은 모든 선의 노드 파악
            let playerEdges = [];
            for (let key in edges) {
                if (edges[key] === player) {
                    let parts = key.split('-');
                    playerEdges.push([parseInt(parts[0]), parseInt(parts[1])]);
                }
            }

            // 완전 탐색으로 삼각형(3개의 노드가 서로 연결됨) 찾기
            let hasLost = false;
            for (let i = 0; i < NODE_COUNT; i++) {
                for (let j = i + 1; j < NODE_COUNT; j++) {
                    for (let k = j + 1; k < NODE_COUNT; k++) {
                        if (edges[getEdgeKey(i, j)] === player &&
                            edges[getEdgeKey(j, k)] === player &&
                            edges[getEdgeKey(k, i)] === player) {
                            hasLost = true;
                            break;
                        }
                    }
                }
            }

            if (hasLost) {
                gameOver = true;
                const winner = player === 1 ? 2 : 1;
                const winnerColor = winner === 1 ? "🔴 빨강" : "🔵 파랑";
                statusBox.innerHTML = `☠️ 삼각형 완성! ${winnerColor} 플레이어 승리!`;
                statusBox.className = "status-box game-over";
            } else {
                // 턴 넘기기
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                updateStatus();
            }
        }

        function updateStatus() {
            if (gameOver) return;
            if (currentPlayer === 1) {
                statusBox.innerHTML = "🔴 빨강 플레이어 차례 (선 긋기)";
                statusBox.className = "status-box p1-turn";
            } else {
                statusBox.innerHTML = "🔵 파랑 플레이어 차례 (선 긋기)";
                statusBox.className = "status-box p2-turn";
            }
        }

        // 게임 최초 실행
        window.onload = initGame;
    </script>
</body>
</html>
