<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>숫자 공장: 다이나믹 레일</title>
    <style>
        :root {
            --bg-color: #1a1c1e;
            --panel-color: #2c2f33;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #hud {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            background: var(--panel-color);
            padding: 15px 40px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 1.2rem;
            font-weight: bold;
        }

        #level-tag { color: #ffce00; }
        #combo-tag { color: #00ff88; transition: transform 0.1s; }
        #multiplier-tag { color: #4facfe; font-size: 1rem; margin-left: -15px;}

        /* 레일 (컨베이어 벨트) 구역 */
        #factory-floor {
            width: 75%;
            max-width: 750px;
            height: 150px;
            position: relative;
            background: #23272a;
            border-radius: 10px;
            border: 4px solid #555;
            margin-bottom: 40px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #belt-pattern {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 30px;
            background: repeating-linear-gradient(90deg, #333, #333 30px, #444 30px, #444 60px);
            animation: beltMove 2s linear infinite;
        }

        @keyframes beltMove {
            from { transform: translateX(0); }
            to { transform: translateX(-60px); }
        }

        /* 낭떠러지 (레일 끝) */
        #abyss {
            position: absolute;
            right: 0;
            width: 10%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ff000033);
            border-left: 2px dashed #ff4444;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4444;
            font-weight: bold;
            opacity: 0.7;
        }

        /* 이동하는 숫자 블록 */
        #number-block {
            position: absolute;
            top: 25px;
            left: 0%;
            background: #ffffff;
            color: #1a1c1e;
            width: 80px;
            height: 80px;
            border-radius: 15px;
            font-size: 2.5rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #999, 4px 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* 조작 버튼 */
        #controls {
            display: flex;
            gap: 40px;
        }

        .btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            color: white;
            transition: transform 0.05s, filter 0.1s;
        }
        .btn:active { transform: translateY(5px); filter: brightness(0.8); }
        #btn-prime { background: linear-gradient(135deg, #00f2fe, #4facfe); box-shadow: 0 6px 0 #0076ad; }
        #btn-comp { background: linear-gradient(135deg, #f093fb, #f5576c); box-shadow: 0 6px 0 #b33a4a; }

        /* 시작 오버레이 및 난이도 버튼 */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .diff-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .diff-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #000;
            transition: transform 0.1s;
        }
        .diff-btn:hover { transform: scale(1.05); }
        .btn-easy { background: #4caf50; }
        .btn-normal { background: #ffce00; }
        .btn-hard { background: #f44336; color: white; }

        /* 게임 종료 오버레이 추가 (알림용) */
        #game-over-overlay {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(44, 62, 80, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #f1c40f;
            text-align: center;
            z-index: 200;
        }
        .game-over-btn {
             margin-top: 20px; padding: 10px 30px; font-size: 1.2rem;
             border-radius: 10px; border: none; background: #e74c3c;
             color: white; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 3.5rem; margin-bottom: 10px; color: #fff;">숫자 공장 가동 준비</h1>
        <p style="margin-bottom: 10px; font-size: 1.2rem; color: #ccc;">숫자가 레일 끝으로 떨어지기 전에 분류하세요!</p>
        <p style="margin-bottom: 40px; font-size: 1rem; color: #888;">단축키: [←] 소수 / [→] 합성수</p>
        
        <div class="diff-container">
            <button class="diff-btn btn-easy" onclick="startGame(1, '쉬움')">쉬움 (x1)</button>
            <button class="diff-btn btn-normal" onclick="startGame(2, '보통')">보통 (x2)</button>
            <button class="diff-btn btn-hard" onclick="startGame(3, '어려움')">어려움 (x3)</button>
        </div>
    </div>

    <!-- 종료 화면 팝업 모달 추가 -->
    <div id="game-over-overlay">
        <h2 style="font-size: 2.5rem; color: #e74c3c; margin-bottom: 10px;">공장 가동 중지! 💥</h2>
        <p style="font-size: 1.5rem;">최종 점수: <span id="final-score" style="color: #f1c40f; font-weight: bold;">0</span>점</p>
        <button class="game-over-btn" onclick="closeGameOver()">메타버스로 돌아가기</button>
    </div>

    <div id="hud">
        <div id="level-tag">난이도: 쉬움</div>
        <div id="multiplier-tag">(x1)</div>
        <div>SCORE: <span id="score">0</span></div>
        <div>LIFE: <span id="life">3</span></div>
        <div id="combo-tag">COMBO: <span id="combo">0</span></div>
    </div>

    <div id="factory-floor">
        <div id="belt-pattern"></div>
        <div id="abyss">DANGER</div>
        <div id="number-block">?</div>
    </div>

    <div id="controls">
        <button id="btn-prime" class="btn" onclick="checkAnswer(true)">소수 (Prime)</button>
        <button id="btn-comp" class="btn" onclick="checkAnswer(false)">합성수 (Composite)</button>
    </div>

    <script>
        const AudioCtxClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!AudioCtxClass) return;
            if (!audioCtx) audioCtx = new AudioCtxClass();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'wrong' || type === 'fall') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        let score = 0, life = 3, level = 1, combo = 0;
        let currentNum = 0;
        let isPlaying = false;
        let scoreMultiplier = 1; 
        
        let blockPos = 0; 
        let baseSpeed = 0.18; 
        let speedIncrement = 0.015; 
        let animationId;

        const blockEl = document.getElementById('number-block');
        const scoreEl = document.getElementById('score');
        const lifeEl = document.getElementById('life');
        const levelEl = document.getElementById('level-tag');
        const comboEl = document.getElementById('combo');
        const multiplierEl = document.getElementById('multiplier-tag');

        function isPrime(n) {
            if (n < 2) return false;
            for (let i = 2; i <= Math.sqrt(n); i++) {
                if (n % i === 0) return false;
            }
            return true;
        }

        function generateNumber() {
            let num;
            if (level === 1) {
                const pool = [2, 3, 4, 5, 6, 7, 8, 9, 11, 12, 13, 14, 15, 20, 21, 24];
                num = pool[Math.floor(Math.random() * pool.length)];
            } else if (level === 2) {
                num = Math.floor(Math.random() * 79) + 2; 
            } else {
                if (Math.random() < 0.3) {
                    const tricks = [51, 57, 87, 91, 111, 119, 133, 143, 161, 169];
                    num = tricks[Math.floor(Math.random() * tricks.length)];
                } else {
                    num = Math.floor(Math.random() * 199) + 2; 
                }
            }
            
            if (num === currentNum) return generateNumber(); 
            currentNum = num;
            blockEl.innerText = currentNum;
        }

        function resetBlock() {
            blockPos = 0;
            blockEl.style.left = '0%';
            generateNumber();
        }

        function gameLoop() {
            if (!isPlaying) return;

            blockPos += baseSpeed;
            blockEl.style.left = blockPos + '%';

            if (blockPos > 90) {
                handleMiss('fall');
            }
            
            if (isPlaying) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function checkAnswer(isUserGuessPrime) {
            if (!isPlaying) return;

            const actualPrime = isPrime(currentNum);
            
            if (isUserGuessPrime === actualPrime) {
                playSound('correct');
                
                let earnedScore = Math.round((10 + (combo * 2)) * scoreMultiplier);
                score += earnedScore;
                
                combo++;
                baseSpeed += speedIncrement; 
                
                comboEl.parentElement.style.transform = 'scale(1.2)';
                setTimeout(() => comboEl.parentElement.style.transform = 'scale(1)', 100);
            } else {
                handleMiss('wrong');
            }
            
            updateHUD();
            resetBlock();
        }

        function handleMiss(reason) {
            playSound(reason);
            life--;
            combo = 0; 
            
            document.body.style.transform = 'translate(-10px, 5px)';
            setTimeout(() => document.body.style.transform = 'none', 100);

            if (life <= 0) {
                gameOver();
            } else {
                updateHUD();
                resetBlock(); 
            }
        }

        function updateHUD() {
            scoreEl.innerText = score;
            lifeEl.innerText = life;
            comboEl.innerText = combo;
        }

        function startGame(selectedLevel, levelName) {
            if (AudioCtxClass) {
                if (!audioCtx) audioCtx = new AudioCtxClass();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-overlay').style.display = 'none';
            
            level = selectedLevel;
            score = 0; 
            life = 3; 
            combo = 0; 
            blockPos = 0; 
            
            if (level === 1) {
                baseSpeed = 0.18; 
                scoreMultiplier = 1;
            } else if (level === 2) {
                baseSpeed = 0.24; 
                scoreMultiplier = 2;
            } else {
                baseSpeed = 0.30; 
                scoreMultiplier = 3;
            }

            levelEl.innerText = "난이도: " + levelName;
            multiplierEl.innerText = `(x${scoreMultiplier})`;
            updateHUD();
            isPlaying = true;
            resetBlock();
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-overlay').style.display = 'block';
        }

        function closeGameOver() {
            // 메타버스로 점수 전송 후 닫기
            window.parent.postMessage({ type: 'MINIGAME_OVER', score: score }, '*');
            document.getElementById('game-over-overlay').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (e.key === 'ArrowLeft') { checkAnswer(true); }
            else if (e.key === 'ArrowRight') { checkAnswer(false); }
        });
    </script>
</body>
</html>
