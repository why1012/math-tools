<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>중등 수학 통합 시뮬레이터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --sidebar-width: 260px; --secondary-color: #2c3e50; }

        body, html { 
            margin: 0; padding: 0; width: 100%; 
            height: 100vh;    
            height: 100dvh;  
            height: var(--app-height, 100dvh); 
            overflow: hidden; font-family: 'Pretendard', sans-serif; background: #080d14; 
        }
        
        #wrapper { 
            display: flex; width: 100%; position: relative; overflow: hidden;
            height: 100vh;
            height: 100dvh;
            height: var(--app-height, 100dvh);
        }
        
        #sidebar { 
            width: var(--sidebar-width); height: 100%; background: var(--secondary-color); color: white; 
            position: relative; z-index: 100; display: flex; flex-direction: column;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        
        #toggle-btn {
            position: absolute; top: 15px; right: -45px; width: 45px; height: 55px; 
            background: #3b82f6; 
            color: white; border: none; cursor: pointer; 
            border-radius: 0 12px 12px 0; box-shadow: 4px 2px 10px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 101;
            transition: background 0.2s;
        }
        #toggle-btn:hover { background: #2563eb; }
        #sidebar.collapsed #toggle-btn { background: #3b82f6; }

        .sidebar-content { overflow-y: auto; flex-grow: 1; overflow-x: hidden; }
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        #sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }

        .folder-title { padding: 15px 20px; font-size: 16px; font-weight: 900; background: #34495e; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); user-select: none; }
        .folder-title:hover { background: #415b76; }
        .folder-title::after { content: '▼'; font-size: 11px; color: #bdc3c7; transition: 0.3s; }
        .folder-title.collapsed::after { content: '▶'; }

        .folder-content { max-height: 500px; overflow: hidden; transition: max-height 0.3s ease-out; background: #1f2c39; }
        .folder-content.hidden { max-height: 0 !important; }

        .menu-item { padding: 15px 20px 15px 35px; cursor: pointer; font-weight: bold; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .menu-item:hover { background: #2c3e50; }
        .menu-item.active { background: #1a252f; color: #4da6ff; }
        
        .single-menu { padding-left: 20px; background: #34495e; border-top: 2px solid rgba(0,0,0,0.1); }
        
        #iframe-container { flex-grow: 1; width: 100%; height: 100%; position: relative; background: #080d14; min-width: 0; }
        /* iframe 자체에도 배경색을 주어 로딩 중 투명하게 뚫려 보이지 않게 처리 */
        iframe { width: 100%; height: 100%; border: none; display: none; position: absolute; top:0; left:0; background: #080d14; }
        iframe.active { display: block; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; top: 0; left: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-left: 0 !important; }
            #sidebar.collapsed { transform: translateX(-100%); margin-left: 0 !important; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <nav id="sidebar">
        <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        <div class="sidebar-content">
            <h2 style="text-align:center; margin: 25px 0 20px 0; font-size: 20px;">수학 탐구 도구함</h2>
            
            <div class="menu-item single-menu active" onclick="switchTool('home-frame', this)">🏠 홈 (시작 화면)</div>

            <div class="folder-title collapsed" onclick="toggleFolder('folder1', this)">📁 1단원. 수와 연산</div>
            <div id="folder1" class="folder-content hidden">
                <div class="menu-item" onclick="switchTool('sieve-frame', this)">✔️ 에라토스테네스의 체</div>
                <div class="menu-item" onclick="switchTool('factory-frame', this)">🏭 숫자 공장</div>
            </div>

            <div class="folder-title collapsed" onclick="toggleFolder('folder2', this)">📁 2단원. 정수와 유리수</div>
            <div id="folder2" class="folder-content hidden">
                <div class="menu-item" onclick="switchTool('semdol-frame', this)">🔘 셈돌 상쇄</div>
                <div class="menu-item" onclick="switchTool('rail-frame', this)">🛤️ 레일바이크</div>
                <div class="menu-item" onclick="switchTool('times-frame', this)">✖️ 곱셈의 계산법칙</div>
                <div class="menu-item" onclick="switchTool('tumble-frame', this)">🤸‍♂️ 역수 텀블링</div>
            </div>

            <div class="folder-title collapsed" onclick="toggleFolder('folder3', this)">📁 3단원. 문자와 식</div>
            <div id="folder3" class="folder-content hidden">
                <div class="menu-item" onclick="switchTool('xyz-frame', this)">✨ 문자와 식 마스터</div>
                <div class="menu-item" onclick="switchTool('new-folder-frame', this)">🏀 3점슛 챌린지</div>
                <div class="menu-item" onclick="switchTool('sub-frame', this)">✨ 식의 값 마스터</div>
                <div class="menu-item" onclick="switchTool('block-frame', this)">🧱 대수블록 실험실</div>
                <div class="menu-item" onclick="switchTool('icecream-frame', this)">🍦 아이스크림</div>
                <div class="menu-item" onclick="switchTool('bakery-frame', this)">🥐 베이커리</div>
            </div>

            <div class="folder-title collapsed" onclick="toggleFolder('folder4', this)">📁 4단원. 좌표평면과 그래프</div>
            <div id="folder4" class="folder-content hidden">
                <div class="menu-item" onclick="switchTool('maze-frame', this)">🧩 미로 찾기</div>
            </div>

            <div class="folder-title collapsed" onclick="toggleFolder('folder_nim', this)">📁 주제탐구</div>
            <div id="folder_nim" class="folder-content hidden">
                <div class="menu-item" onclick="switchTool('nim1-frame', this)">🎳 일렬 볼링 게임</div>
                <div class="menu-item" onclick="switchTool('nim2-frame', this)">🍫 초콜릿 먹기 게임</div>
                <div class="menu-item" onclick="switchTool('nim3-frame', this)">🕸️ 심(Sim) 게임</div>
                <div class="menu-item" onclick="switchTool('nim-frame', this)">🎲 님게임</div>
                <div class="menu-item" onclick="switchTool('math-yacht-frame', this)">⛵ 매스 얏(Math Yacht)</div>
            </div>

        </div>
    </nav>

    <main id="iframe-container">
        <iframe id="home-frame" class="active" src="./home.html"></iframe>
        
        <iframe id="sieve-frame" data-src="./sieve.html"></iframe>
        <iframe id="factory-frame" data-src="./factory.html"></iframe>
        <iframe id="semdol-frame" data-src="./semdol.html"></iframe>
        <iframe id="rail-frame" data-src="./railbike.html"></iframe>
        <iframe id="times-frame" data-src="./timesrule.html"></iframe>
        <iframe id="tumble-frame" data-src="./tumble.html"></iframe>
        <iframe id="xyz-frame" data-src="./3.1.html"></iframe>
        <iframe id="new-folder-frame" data-src="./3.2/3.2.html"></iframe>
        <iframe id="sub-frame" data-src="./sub.html"></iframe>
        <iframe id="block-frame" data-src="./3.3.html"></iframe>
        
        <iframe id="icecream-frame" data-src="./ice cream/ice_cream.html"></iframe>
        <iframe id="bakery-frame" data-src="./bakery/index.html"></iframe>
        <iframe id="maze-frame" data-src="./maze/index.html"></iframe>

        <iframe id="nim1-frame" data-src="./nim1.html"></iframe>
        <iframe id="nim2-frame" data-src="./nim2.html"></iframe>
        <iframe id="nim3-frame" data-src="./nim3.html"></iframe>
        <iframe id="nim-frame" data-src="./Nim.html"></iframe>
        <iframe id="math-yacht-frame" data-src="./math yacht/index.html"></iframe>
    </main>
</div>

<script>
    const sidebar = document.getElementById('sidebar');

    // 모바일 환경일 경우 시작할 때 사이드바를 접어둠
    if (window.innerWidth <= 768) {
        sidebar.classList.add('collapsed');
    }

    function setAppHeight() {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', function() {
        setTimeout(setAppHeight, 150);
    });
    setAppHeight();

    function toggleSidebar() { 
        sidebar.classList.toggle('collapsed'); 
    }
    
    function toggleFolder(id, el) {
        const content = document.getElementById(id);
        content.classList.toggle('hidden');
        el.classList.toggle('collapsed');
    }

    function switchTool(id, el) {
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        
        const targetFrame = document.getElementById(id);
        targetFrame.classList.add('active');
        el.classList.add('active');

        // ★ 핵심: 해당 메뉴를 처음 클릭했을 때만 실제 파일을 로딩함 (브라우저 다운 방지)
        if (!targetFrame.getAttribute('src') && targetFrame.getAttribute('data-src')) {
            targetFrame.setAttribute('src', targetFrame.getAttribute('data-src'));
        }

        // 모바일에서는 메뉴 클릭 시 사이드바 자동 숨김
        if (window.innerWidth <= 768) {
            sidebar.classList.add('collapsed');
        }
    }
</script>
</body>
</html>
