<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중등 수학 통합 시뮬레이터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --sidebar-width: 260px; --secondary-color: #2c3e50; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif;}
        #wrapper { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar { width: var(--sidebar-width); background: var(--secondary-color); color: white; transition: 0.3s; position: relative; flex-shrink: 0; overflow-y: auto; }
        #sidebar.collapsed { margin-left: -260px; }
        
        #toggle-btn { position: absolute; right: -40px; top: 10px; width: 40px; height: 40px; background: var(--secondary-color); color: white; border: none; cursor: pointer; border-radius: 0 5px 5px 0; z-index: 10; }
        
        .folder-title { 
            padding: 15px 20px; font-size: 16px; font-weight: 900; background: #34495e; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); user-select: none;
        }
        .folder-title:hover { background: #415b76; }
        .folder-title::after { content: '▼'; font-size: 11px; color: #bdc3c7; transition: 0.3s; }
        
        /* 💡 기본적으로 접혀있는 상태의 화살표 */
        .folder-title.collapsed::after { content: '▶'; }

        .folder-content { 
            max-height: 500px; overflow: hidden; transition: max-height 0.3s ease-out; background: #1f2c39;
        }
        /* 💡 기본적으로 메뉴가 숨겨져 있도록 설정 */
        .folder-content.hidden { max-height: 0 !important; }

        .menu-item { padding: 15px 20px 15px 35px; cursor: pointer; font-weight: bold; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .menu-item:hover { background: #2c3e50; }
        .menu-item.active { background: #1a252f; color: #4da6ff; }
        
        #main-content { flex-grow: 1; background: #080d14; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div id="wrapper">
    <nav id="sidebar">
        <h2 style="text-align:center; margin: 20px 0; font-size: 20px;">수학 탐구 도구함</h2>
        <button id="toggle-btn" onclick="toggleSidebar()">☰</button>
        
        <div class="folder-title collapsed" onclick="toggleFolder('folder1', this)">📁 1단원. 수와 연산</div>
        <div id="folder1" class="folder-content hidden">
            <div class="menu-item active" onclick="switchTool('sieve-frame', this)">✔️ 에라토스테네스의 체</div>
        </div>

        <div class="folder-title collapsed" onclick="toggleFolder('folder2', this)">📁 2단원. 정수와 유리수</div>
        <div id="folder2" class="folder-content hidden">
            <div class="menu-item" onclick="switchTool('semdol-frame', this)">🔘 셈돌 상쇄</div>
            <div class="menu-item" onclick="switchTool('rail-frame', this)">🛤️ 레일바이크</div>
            <div class="menu-item" onclick="switchTool('times-frame', this)">✖️ 곱셈의 계산법칙</div>
            <div class="menu-item" onclick="switchTool('tumble-frame', this)">🤸‍♂️ 역수 텀블링</div>
        </div>

        <div class="folder-title collapsed" onclick="toggleFolder('folder3', this)">📁 3단원. 문자와 식</div>
        <div id="folder3" class="folder-content hidden">
            <div class="menu-item" onclick="switchTool('xyz-frame', this)">✨ 문자와 식 마스터</div>
            <div class="menu-item" onclick="switchTool('new-folder-frame', this)">🏀 3점슛 챌린지</div>
            <div class="menu-item" onclick="switchTool('block-frame', this)">🧱 대수블록 실험실</div>
        </div>
    </nav>

    <main id="main-content">
        <iframe id="sieve-frame" class="active" src="sieve.html"></iframe>
        <iframe id="semdol-frame" src="semdol.html"></iframe>
        <iframe id="rail-frame" src="railbike.html"></iframe>
        <iframe id="times-frame" src="timesrule.html"></iframe>
        <iframe id="tumble-frame" src="tumble.html"></iframe>
        <iframe id="xyz-frame" src="3.1.html"></iframe>
        <iframe id="new-folder-frame" src="3.2/3.2.html"></iframe>
        <iframe id="block-frame" src="3.3.html"></iframe>
    </main>
</div>

<script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    
    function toggleFolder(id, el) {
        const content = document.getElementById(id);
        content.classList.toggle('hidden');
        el.classList.toggle('collapsed');
    }

    function switchTool(id, el) {
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
