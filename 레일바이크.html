<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정수의 곱셈: 꼬마 기차 레일 시뮬레이터 (추적 모드)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            margin: 40px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fff;
            /* 기존의 scroll-behavior: smooth 제거 (JS로 완벽 동기화하기 위함) */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .scroll-wrapper::-webkit-scrollbar { height: 16px; }
        .scroll-wrapper::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .scroll-wrapper::-webkit-scrollbar-thumb { background: #bdc3c7; border-radius: 8px; border: 3px solid #f1f1f1; }
        .scroll-wrapper::-webkit-scrollbar-thumb:hover { background: #95a5a6; }

        #rail-viewport { position: relative; width: 16000px; height: 230px; }
        
        #track { position: absolute; top: 90px; left: 0; width: 100%; height: 12px; border-top: 3px solid #555; border-bottom: 3px solid #555; background: #e0e0e0; }
        .sleeper { position: absolute; top: -5px; width: 6px; height: 18px; background: #8b4513; border-radius: 2px; }
        
        .tick { position: absolute; top: 115px; width: 3px; height: 12px; background: #999; transform: translateX(-50%); }
        .tick-label { position: absolute; top: 140px; transform: translateX(-50%); font-size: 36px; color: #444; font-weight: 900; letter-spacing: -1px; }
        .zero-point { position: absolute; top: 80px; width: 4px; height: 70px; background: rgba(231, 76, 60, 0.6); z-index: 1; transform: translateX(-50%); }

        /* 기차 이동 속도 1.2초로 변경 및 ease-in-out 적용 */
        #train { 
            position: absolute; 
            top: 45px; 
            width: 80px; 
            height: 50px; 
            margin-left: -40px;
            transition: all 1.2s ease-in-out; 
            z-index: 10; 
        }
        .locomotive { position: absolute; width: 60px; height: 35px; background: #2c3e50; border-radius: 5px 15px 5px 5px; left: 10px; }
        .cabin { position: absolute; top: -15px; right: 5px; width: 30px; height: 20px; background: #34495e; border-radius: 5px 5px 0 0; }
        .wheel { position: absolute; bottom: -5px; width: 14px; height: 14px; background: #222; border-radius: 50%; border: 2px solid #bdc3c7; }
        .window { position: absolute; top: 4px; right: 5px; width: 12px; height: 10px; background: #ecf0f1; border-radius: 2px; }

        .controls { margin: 20px 0 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; }
        .input-box { background: #f9f9f9; padding: 10px 20px; border-radius: 12px; border: 1px solid #e0e0e0; }
        input { width: 50px; font-size: 20px; text-align: center; padding: 5px; border: 2px solid #2c3e50; border-radius: 6px; outline: none; }
        
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-blue { background-color: #3498db; color: white; }
        .btn-gray { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #display-panel { padding: 25px; background: #fdfdfd; border-radius: 15px; border: 1px solid #eee; }
        .equation { font-size: 36px; font-weight: 900; color: #2c3e50; margin-bottom: 15px; letter-spacing: -1px; }
        .explanation { font-size: 19px; color: #555; line-height: 1.6; word-break: keep-all; }
        .status-badge { display: inline-block; padding: 6px 18px; background: #2c3e50; color: white; border-radius: 30px; font-size: 18px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛤️ 정수의 곱셈: 꼬마 기차 탐구 시뮬레이터</h2>
    
    <div class="input-box">
        <strong>기차 속도(m/s):</strong> 
        <input type="number" id="velocity" value="3">
        <span style="font-size: 14px; color: #666; margin-left:10px;">(동쪽 +, 서쪽 -)</span>
    </div>

    <div class="scroll-wrapper" id="scroll-wrapper">
        <div id="rail-viewport">
            <div class="zero-point" id="zero-marker"></div>
            <div id="track"></div>
            <div id="train">
                <div class="locomotive">
                    <div class="cabin"><div class="window"></div></div>
                    <div class="wheel" style="left: 5px;"></div>
                    <div class="wheel" style="right: 5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-blue" onclick="moveTime(-1)">⬅️ 1초 전으로</button>
        <div class="status-badge">현재 시간: <span id="time-val">0</span>초</div>
        <button class="btn-blue" onclick="moveTime(1)">1초 후로 ➡️</button>
        <button class="btn-gray" onclick="reset()">초기화</button>
    </div>

    <div id="display-panel">
        <div class="equation" id="math-eq">(속도) × (시간) = (위치)</div>
        <div class="explanation" id="exp-text">속도를 설정하고 시간을 앞뒤로 움직여 기차의 위치를 확인해 보세요.</div>
    </div>
</div>

<script>
    let time = 0;
    const train = document.getElementById('train');
    const track = document.getElementById('track');
    const scrollWrapper = document.getElementById('scroll-wrapper');
    const timeDisplay = document.getElementById('time-val');
    const mathEq = document.getElementById('math-eq');
    const expText = document.getElementById('exp-text');

    const unitPx = 80;
    const centerPx = 8000;
    const minRange = -100;
    const maxRange = 100;

    function initTrack() {
        document.getElementById('zero-marker').style.left = centerPx + 'px';

        for (let i = minRange; i <= maxRange; i++) {
            const posX = centerPx + (i * unitPx);
            
            const sleeper = document.createElement('div');
            sleeper.className = 'sleeper';
            sleeper.style.left = posX + 'px';
            track.appendChild(sleeper);
            
            if (i !== maxRange) {
                const subSleeper = document.createElement('div');
                subSleeper.className = 'sleeper';
                subSleeper.style.left = (posX + unitPx / 2) + 'px';
                track.appendChild(subSleeper);
            }

            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.left = posX + 'px';
            if (i % 5 === 0) tick.style.height = '20px'; 
            document.getElementById('rail-viewport').appendChild(tick);

            const label = document.createElement('div');
            label.className = 'tick-label';
            label.style.left = posX + 'px';
            label.innerText = i;
            
            if (i === 0) {
                label.style.color = '#e74c3c';
                label.style.fontSize = '42px';
            }
            document.getElementById('rail-viewport').appendChild(label);
        }
    }

    // 기차의 CSS transition(1.2초, ease-in-out)과 동일한 궤적으로 스크롤을 동기화하는 함수
    function syncCamera(targetPx, duration) {
        const wrapperWidth = scrollWrapper.clientWidth;
        const targetScroll = targetPx - (wrapperWidth / 2);
        
        if (duration === 0) {
            scrollWrapper.scrollLeft = targetScroll;
            return;
        }

        const startScroll = scrollWrapper.scrollLeft;
        const change = targetScroll - startScroll;
        const startTime = performance.now();

        function animateScroll(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // ease-in-out 곡선 수식
            const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
            
            scrollWrapper.scrollLeft = startScroll + change * ease;

            if (progress < 1) {
                requestAnimationFrame(animateScroll);
            }
        }
        requestAnimationFrame(animateScroll);
    }

    function update(isInstant = false) {
        const v = parseInt(document.getElementById('velocity').value) || 0;
        const pos = v * time;
        const targetPx = centerPx + (pos * unitPx);
        
        // 기차 이동 애니메이션 시간 (isInstant가 true면 0초)
        const duration = isInstant ? 0 : 1200; 
        train.style.transition = `all ${duration / 1000}s ease-in-out`;
        train.style.left = targetPx + 'px';
        
        if (v > 0) train.style.transform = 'scaleX(1)';
        else if (v < 0) train.style.transform = 'scaleX(-1)';
        
        // 카메라 완벽 동기화 추적
        syncCamera(targetPx, duration);
        
        timeDisplay.innerText = time;
        const vStr = v >= 0 ? `+${v}` : v;
        const tStr = time >= 0 ? `+${time}` : time;
        const pStr = pos > 0 ? `+${pos}` : (pos < 0 ? pos : '0');
        
        mathEq.innerText = `(${vStr}) × (${tStr}) = ${pStr}`;
        
        let dirLabel = v >= 0 ? "동쪽(+)" : "서쪽(-)";
        let timeLabel = time >= 0 ? `${time}초 후(+)` : `${Math.abs(time)}초 전(-)`;
        let posLabel = pos > 0 ? `동쪽 ${pos}m(+${pos})` : (pos < 0 ? `서쪽 ${Math.abs(pos)}m(${pos})` : "원점(0)");
        
        expText.innerHTML = `<strong>${dirLabel}</strong>으로 초속 <strong>${Math.abs(v)}m</strong>씩 달리는 기차의<br><strong>${timeLabel}</strong> 위치는 <strong>${posLabel}</strong> 지점입니다.`;
    }

    function moveTime(delta) {
        const v = parseInt(document.getElementById('velocity').value) || 0;
        let nextTime = time + delta;
        
        if (Math.abs(v * nextTime) > maxRange) {
            alert(`도착 위치가 수직선 범위(-100 ~ +100)를 벗어나 더 이상 이동할 수 없습니다.`);
            return;
        }
        
        time = nextTime;
        update(false); // 1.2초 애니메이션 이동
    }

    function reset() {
        time = 0;
        document.getElementById('velocity').value = 3;
        update(false); // 1.2초 애니메이션 이동
    }

    initTrack();
    
    // 로딩 시에는 애니메이션 없이 즉시 원점 정렬
    setTimeout(() => {
        update(true); 
    }, 100);

    // 창 크기 변경 시 중앙 유지 (애니메이션 없이)
    window.addEventListener('resize', () => {
        update(true);
    });
</script>

</body>
</html>
