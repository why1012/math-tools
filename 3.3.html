<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>분배법칙 블록 실험실</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f4f6f9; 
            padding: 15px; 
            touch-action: none;
            min-height: 100vh;
        }
        h2 { color: #2c3e50; margin-bottom: 4px; font-size: 22px; }
        .instruction { color: #666; margin-bottom: 15px; font-size: 14px; text-align: center; line-height: 1.5; }

        /* 툴바 */
        .toolbar { 
            background: white; padding: 10px 18px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            display: flex; gap: 12px; margin-bottom: 15px; 
            flex-wrap: wrap; justify-content: center; align-items: center; 
        }
        .control-group { display: flex; align-items: center; gap: 6px; border-right: 2px solid #eee; padding-right: 12px; }
        .control-group:last-child { border-right: none; padding-right: 0; }
        input[type="number"] { width: 42px; padding: 5px; font-size: 15px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 13px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-x { background-color: #4CAF50; color: white; }
        .btn-one { background-color: #FFEB3B; color: black; }
        .btn-clear { background-color: #78909c; color: white; }

        /* 메인 컨테이너 */
        .main-container {
            display: flex;
            align-items: stretch;
            width: 100%;
            max-width: 1100px;
            height: 460px;
            gap: 0;
        }

        /* 워크스페이스 공통 */
        .workspace {
            background-color: white;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
        }
        #workspace-left {
            flex: 4;
            border: 3px dashed #b0bec5;
            border-right: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        #workspace-right {
            flex: 5;
            border: 3px dashed #a5d6a7;
            border-left: none;
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            background: #f9fff9;
        }

        .side-label {
            position: absolute;
            top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #90a4ae;
            z-index: 0;
            pointer-events: none;
        }

        /* 곱셈기 영역 */
        .multiplier-section {
            flex: 0 0 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #e8eaf6 0%, #c5cae9 100%);
            border-top: 3px dashed #9fa8da;
            border-bottom: 3px dashed #9fa8da;
            position: relative;
            z-index: 1;
        }
        .multiply-symbol {
            font-size: 30px;
            font-weight: bold;
            color: #3949ab;
            margin-bottom: 4px;
        }
        #multiplier {
            width: 52px;
            height: 52px;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            border: 3px solid #3949ab;
            border-radius: 14px;
            color: #283593;
            background: white;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
            -moz-appearance: textfield;
        }
        #multiplier::-webkit-inner-spin-button,
        #multiplier::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        #multiplier:focus {
            border-color: #1a237e;
            box-shadow: 0 0 15px rgba(57, 73, 171, 0.45);
            transform: scale(1.08);
        }
        .multiply-arrow {
            font-size: 24px;
            color: #3949ab;
            margin-top: 8px;
            animation: arrowPulse 1.5s ease-in-out infinite;
        }
        @keyframes arrowPulse {
            0%, 100% { opacity: 0.5; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(4px); }
        }

        /* 드래그 가능한 블록 */
        .block { 
            position: absolute; cursor: grab; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; user-select: none; border: 2px solid rgba(0,0,0,0.35); 
            box-shadow: 3px 3px 6px rgba(0,0,0,0.2); border-radius: 3px; box-sizing: border-box; 
            transition: box-shadow 0.1s;
            z-index: 5;
        }
        .block:active { cursor: grabbing; box-shadow: 8px 8px 15px rgba(0,0,0,0.3); z-index: 1000 !important; }
        .block-x { background-color: #4CAF50; color: white; }
        .block-one { background-color: #FFEB3B; color: #333; }

        /* 블록 툴팁 */
        .block::before, .block::after {
            position: absolute; font-size: 14px; font-weight: bold; color: #d32f2f; opacity: 0; transition: opacity 0.2s;
            pointer-events: none; background: rgba(255,255,255,0.95); padding: 3px 7px; border-radius: 6px; border: 2px solid #d32f2f; white-space: nowrap; z-index: 10;
        }
        .block:hover::before, .block:hover::after, .block:active::before, .block:active::after { opacity: 1; }
        .block::before { content: attr(data-width); top: -30px; left: 50%; transform: translateX(-50%); }
        .block::after { content: attr(data-height); left: -40px; top: 50%; transform: translateY(-50%); }

        /* 결과 컨테이너 (절대 위치 기반) */
        #result-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
        }

        /* 결과 블록 */
        .result-block {
            position: absolute;
            overflow: visible;
            border: 2px solid rgba(0,0,0,0.25);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.12);
            border-radius: 3px;
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation-fill-mode: both;
        }
        .result-block.block-x { background-color: #66BB6A; }
        .result-block.block-one { background-color: #FFF176; }

        @keyframes popIn {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 결과 블록 내부: 세그먼트 행 */
        .segments-row {
            display: flex;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 2px;
        }
        .result-segment {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden;
        }
        .result-segment + .result-segment {
            border-left: 2.5px dashed rgba(0,0,0,0.22);
        }
        .result-block.block-x .result-segment {
            color: rgba(255,255,255,0.55);
        }
        .result-block.block-one .result-segment {
            color: rgba(0,0,0,0.3);
        }

        /* 총합 라벨 */
        .result-total-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 900;
            z-index: 1;
            white-space: nowrap;
            padding: 2px 10px;
            border-radius: 6px;
            pointer-events: none;
        }
        .result-block.block-x .result-total-label {
            color: white;
            background: rgba(56, 142, 60, 0.8);
        }
        .result-block.block-one .result-total-label {
            color: #333;
            background: rgba(255, 238, 88, 0.85);
        }

        /* ×n 뱃지 */
        .multiply-badge {
            position: absolute;
            top: -9px;
            right: -9px;
            background: #3949ab;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            z-index: 3;
        }

        /* 빈 상태 메시지 */
        .empty-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #bbb;
            font-size: 15px;
            text-align: center;
            line-height: 1.6;
            pointer-events: none;
        }

        /* 쓰레기통 */
        .trash-zone {
            position: absolute; right: 10px; bottom: 10px;
            width: 58px; height: 58px;
            background: rgba(244,67,54,0.1); border: 3px dashed rgba(244,67,54,0.35);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; z-index: 2; transition: all 0.25s ease; pointer-events: none;
        }
        .trash-zone.active {
            background: rgba(244,67,54,0.3); border-color: #F44336;
            transform: scale(1.25); box-shadow: 0 0 20px rgba(244,67,54,0.5);
        }
        .trash-label {
            position: absolute; bottom: -18px; font-size: 10px; font-weight: bold;
            color: #F44336; opacity: 0.5; white-space: nowrap;
            transition: opacity 0.25s;
        }
        .trash-zone.active .trash-label { opacity: 1; }

        /* 수식 표시창 */
        #expression-display { 
            margin-top: 18px; font-size: 28px; font-weight: bold; color: #333; 
            background: white; padding: 14px 35px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid #eee;
            text-align: center;
            max-width: 1100px;
            width: 100%;
            transition: all 0.3s;
            line-height: 1.4;
        }
        .hl-n { color: #283593; font-weight: 900; }
        .hl-left { color: #555; }
        .hl-result { color: #2E7D32; font-weight: 900; }
        .hl-eq { color: #999; margin: 0 8px; }
        .hl-times { color: #283593; margin: 0 4px; }
    </style>
</head>
<body>

    <h2>✖️ 분배법칙 블록 실험실</h2>
    <div class="instruction">왼쪽에 블록을 배치하고, 가운데 곱하는 수를 설정하면<br>오른쪽에 각 항이 곱해진 결과가 나타납니다! (블록을 🗑️로 드래그하여 삭제)</div>

    <div class="toolbar">
        <div class="control-group">
            <span style="font-weight:bold;color:#388E3C;">[ x 블록 ]</span>
            세로: <span style="font-weight:bold;">x</span> &nbsp;|&nbsp; 가로: <input type="number" id="x-width" value="1" min="1" max="10">
            <button class="btn btn-x" onclick="addXBlock()">+ 추가</button>
        </div>
        <div class="control-group">
            <span style="font-weight:bold;color:#F57F17;">[ 상수 블록 ]</span>
            가로: <input type="number" id="c-width" value="1" min="1" max="10">
            세로: <input type="number" id="c-height" value="1" min="1" max="10">
            <button class="btn btn-one" onclick="addConstBlock()">+ 추가</button>
        </div>
        <button class="btn btn-clear" onclick="clearWorkspace()">🗑️ 모두 지우기</button>
    </div>

    <div class="main-container">
        <!-- 왼쪽: 식 만들기 -->
        <div id="workspace-left" class="workspace">
            <div class="side-label" style="left:12px;">📐 식 만들기</div>
            <div class="trash-zone" id="trash-zone">🗑️<span class="trash-label">버리기</span></div>
        </div>

        <!-- 가운데: 곱셈기 -->
        <div class="multiplier-section">
            <div class="multiply-symbol">×</div>
            <input type="number" id="multiplier" value="3" min="1" max="20">
            <div class="multiply-arrow">→</div>
        </div>

        <!-- 오른쪽: 결과 -->
        <div id="workspace-right" class="workspace">
            <div class="side-label" style="left:12px;">✨ 결과</div>
            <div id="result-container">
                <div class="empty-message">← 왼쪽에 블록을<br>놓아보세요!</div>
            </div>
        </div>
    </div>

    <div id="expression-display">
        <span class="hl-n">3</span><span class="hl-times"> × </span>( <span class="hl-left" id="left-exp">0</span> )<span class="hl-eq"> = </span><span class="hl-result" id="right-exp">0</span>
    </div>

    <script>
        const workspaceLeft = document.getElementById('workspace-left');
        const workspaceRight = document.getElementById('workspace-right');
        const resultContainer = document.getElementById('result-container');
        const trashZone = document.getElementById('trash-zone');
        const multiplierInput = document.getElementById('multiplier');
        const leftExpSpan = document.getElementById('left-exp');
        const rightExpSpan = document.getElementById('right-exp');

        let isDragging = false;
        let currentBlock = null;
        let offsetX = 0, offsetY = 0;

        const UNIT = 40;
        const SNAP_THRESHOLD = 25;

        // 곱셈기 변경 시 결과 업데이트
        multiplierInput.addEventListener('input', updateResult);
        multiplierInput.addEventListener('change', updateResult);

        // ─── 식 포맷팅 ───
        function formatExpression(xVal, constVal) {
            if (xVal === 0 && constVal === 0) return "0";
            let parts = [];
            if (xVal > 0) parts.push(xVal === 1 ? "x" : xVal + "x");
            if (constVal > 0) parts.push(String(constVal));
            return parts.join(" + ");
        }

        // ─── 결과 업데이트 (핵심 로직) ───
        function updateResult() {
            resultContainer.innerHTML = '';
            const n = Math.max(1, parseInt(multiplierInput.value) || 1);
            const leftBlocks = workspaceLeft.querySelectorAll('.block');

            // 빈 상태
            if (leftBlocks.length === 0) {
                resultContainer.innerHTML = '<div class="empty-message">← 왼쪽에 블록을<br>놓아보세요!</div>';
                leftExpSpan.innerText = '0';
                rightExpSpan.innerText = '0';
                document.querySelector('.hl-n').innerText = n;
                return;
            }

            // 1) 왼쪽 블록 정보 수집
            const infos = Array.from(leftBlocks).map(b => ({
                x: parseFloat(b.style.left),
                y: parseFloat(b.style.top),
                w: b.offsetWidth,
                h: b.offsetHeight,
                isX: b.dataset.height === 'x',
                coeff: parseInt(b.dataset.width),
                constH: b.dataset.height === 'x' ? 0 : parseInt(b.dataset.height),
                label: b.innerText
            }));

            // 2) 스냅 관계 탐지 — 연결된 블록 쌍을 찾아서 오른쪽에도 정확히 이어붙이기
            const SNAP_DETECT = 6; // 스냅 감지 임계값 (px)

            // 각 블록별 연결 정보: { rightOf: index, belowOf: index }
            const connections = infos.map(() => ({ rightOf: -1, belowOf: -1 }));
            
            for (let i = 0; i < infos.length; i++) {
                for (let j = 0; j < infos.length; j++) {
                    if (i === j) continue;
                    const a = infos[j], b = infos[i];
                    // i가 j의 오른쪽에 스냅되었는지
                    if (Math.abs((a.x + a.w) - b.x) <= SNAP_DETECT && Math.abs(a.y - b.y) <= SNAP_DETECT) {
                        if (connections[i].rightOf === -1) connections[i].rightOf = j;
                    }
                    // i가 j의 아래쪽에 스냅되었는지
                    if (Math.abs((a.y + a.h) - b.y) <= SNAP_DETECT && Math.abs(a.x - b.x) <= SNAP_DETECT) {
                        if (connections[i].belowOf === -1) connections[i].belowOf = j;
                    }
                }
            }

            // 3) 오른쪽 위치 계산: 루트 블록(연결 없는)부터 시작해서 BFS로 위치 전파
            const rightPos = infos.map(() => null); // { x, y }

            // 루트 블록 찾기: rightOf도 belowOf도 -1인 블록
            const roots = [];
            const childOfSomeone = new Set();
            for (let i = 0; i < infos.length; i++) {
                if (connections[i].rightOf !== -1) childOfSomeone.add(i);
                if (connections[i].belowOf !== -1) childOfSomeone.add(i);
            }
            for (let i = 0; i < infos.length; i++) {
                if (!childOfSomeone.has(i)) roots.push(i);
            }
            // 연결 안 된 블록도 루트로 처리
            if (roots.length === 0) {
                // 모든 블록이 서로 연결된 경우 — 첫 번째를 루트로
                roots.push(0);
            }

            // 루트 블록의 기본 위치: 왼쪽과 동일한 상대 위치로 시작
            const minLeftX = Math.min(...infos.map(b => b.x));
            const minLeftY = Math.min(...infos.map(b => b.y));

            for (const r of roots) {
                if (rightPos[r]) continue;
                // 루트 위치: 왼쪽 위치에서 minX를 빼고 사용
                rightPos[r] = {
                    x: (infos[r].x - minLeftX),
                    y: infos[r].y
                };
                // BFS 전파
                const queue = [r];
                const visited = new Set([r]);
                while (queue.length > 0) {
                    const cur = queue.shift();
                    // cur의 오른쪽에 있는 블록들 찾기
                    for (let i = 0; i < infos.length; i++) {
                        if (visited.has(i)) continue;
                        if (connections[i].rightOf === cur) {
                            rightPos[i] = {
                                x: rightPos[cur].x + infos[cur].w * n - 2,
                                y: rightPos[cur].y
                            };
                            visited.add(i);
                            queue.push(i);
                        }
                        if (connections[i].belowOf === cur) {
                            rightPos[i] = {
                                x: rightPos[cur].x,
                                y: rightPos[cur].y + infos[cur].h - 2
                            };
                            visited.add(i);
                            queue.push(i);
                        }
                    }
                }
            }

            // 아직 위치가 안 잡힌 블록 (고립된 블록) 처리
            for (let i = 0; i < infos.length; i++) {
                if (!rightPos[i]) {
                    rightPos[i] = {
                        x: (infos[i].x - minLeftX) * n,
                        y: infos[i].y
                    };
                }
            }

            // 4) 바운딩 박스 계산 & 축소 비율
            const maxRight = Math.max(...infos.map((b, i) => rightPos[i].x + b.w * n));
            const maxBottom = Math.max(...infos.map((b, i) => rightPos[i].y + b.h));
            const availW = workspaceRight.clientWidth - 30;
            const availH = workspaceRight.clientHeight - 20;
            const fitX = maxRight > availW ? availW / maxRight : 1;
            const fitY = maxBottom > availH ? availH / maxBottom : 1;
            const fit = Math.min(fitX, fitY, 1);

            // 5) 집계 & 결과 블록 생성
            let totalXCoeff = 0, totalConst = 0;

            infos.forEach((info, i) => {
                if (info.isX) totalXCoeff += info.coeff;
                else totalConst += info.coeff * info.constH;

                const finalX = rightPos[i].x * fit + 15;
                const finalY = rightPos[i].y * fit + 10;
                const finalW = info.w * n * fit;
                const finalH = info.h * fit;

                createResultBlock(info, n, finalX, finalY, finalW, finalH, i);
            });

            // 6) 수식 표시 업데이트
            const leftStr = formatExpression(totalXCoeff, totalConst);
            const rightStr = formatExpression(totalXCoeff * n, totalConst * n);
            leftExpSpan.innerText = leftStr;
            rightExpSpan.innerText = rightStr;
            document.querySelector('.hl-n').innerText = n;
        }

        // ─── 결과 블록 생성 ───
        function createResultBlock(info, n, x, y, w, h, index) {
            const block = document.createElement('div');
            block.className = 'result-block ' + (info.isX ? 'block-x' : 'block-one');
            block.style.left = x + 'px';
            block.style.top = y + 'px';
            block.style.width = w + 'px';
            block.style.height = h + 'px';
            block.style.animationDelay = (index * 0.06) + 's';

            const segWidth = w / n;

            // 세그먼트 (점선 구분선 + 각 칸에 원래값 표시)
            const segRow = document.createElement('div');
            segRow.className = 'segments-row';

            for (let i = 0; i < n; i++) {
                const seg = document.createElement('div');
                seg.className = 'result-segment';
                // 세그먼트 폭이 충분하면 원래 값 라벨 표시
                if (segWidth >= 28) {
                    seg.textContent = info.label;
                    seg.style.fontSize = Math.max(10, Math.min(16, segWidth * 0.3)) + 'px';
                }
                segRow.appendChild(seg);
            }
            block.appendChild(segRow);

            // 총합 라벨 (n > 1일 때만 별도 표시)
            if (n > 1) {
                const total = document.createElement('div');
                total.className = 'result-total-label';
                if (info.isX) {
                    const nc = info.coeff * n;
                    total.textContent = nc === 1 ? 'x' : nc + 'x';
                } else {
                    total.textContent = info.coeff * info.constH * n;
                }
                total.style.fontSize = Math.max(14, Math.min(24, w * 0.1)) + 'px';
                block.appendChild(total);
            } else {
                // n=1: 가운데에 값만 표시
                const label = document.createElement('div');
                label.className = 'result-total-label';
                label.textContent = info.label;
                label.style.fontSize = Math.max(14, Math.min(22, w * 0.15)) + 'px';
                block.appendChild(label);
            }

            // ×n 뱃지
            if (n > 1) {
                const badge = document.createElement('span');
                badge.className = 'multiply-badge';
                badge.textContent = '×' + n;
                block.appendChild(badge);
            }

            resultContainer.appendChild(block);
        }

        // ─── 블록 추가 ───
        function addXBlock() {
            const w = parseInt(document.getElementById('x-width').value) || 1;
            const block = document.createElement('div');
            block.classList.add('block', 'block-x');
            block.dataset.width = w;
            block.dataset.height = 'x';
            block.innerText = w === 1 ? 'x' : w + 'x';
            block.style.width = (w * UNIT) + 'px';
            block.style.height = '120px';
            setupBlock(block);
        }

        function addConstBlock() {
            const w = parseInt(document.getElementById('c-width').value) || 1;
            const h = parseInt(document.getElementById('c-height').value) || 1;
            const area = w * h;
            const block = document.createElement('div');
            block.classList.add('block', 'block-one');
            block.dataset.width = w;
            block.dataset.height = h;
            block.innerText = area;
            block.style.width = (w * UNIT) + 'px';
            block.style.height = (h * UNIT) + 'px';
            setupBlock(block);
        }

        function setupBlock(block) {
            const wsW = workspaceLeft.clientWidth;
            const wsH = workspaceLeft.clientHeight;
            const bw = parseInt(block.style.width);
            const bh = parseInt(block.style.height);
            const startX = (wsW / 2) - (bw / 2) + (Math.random() * 60 - 30);
            const startY = (wsH / 2) - (bh / 2) + (Math.random() * 60 - 30);
            block.style.left = Math.max(10, Math.min(startX, wsW - bw - 10)) + 'px';
            block.style.top = Math.max(40, Math.min(startY, wsH - bh - 10)) + 'px';

            function dragStart(e) {
                e.preventDefault();
                isDragging = true;
                currentBlock = block;
                const rect = block.getBoundingClientRect();
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                offsetX = clientX - rect.left;
                offsetY = clientY - rect.top;
                workspaceLeft.appendChild(block);
            }

            block.addEventListener('mousedown', dragStart);
            block.addEventListener('touchstart', dragStart, {passive: false});

            workspaceLeft.appendChild(block);
            updateResult();
        }

        // ─── 드래그 이동 ───
        function dragMove(e) {
            if (!isDragging || !currentBlock) return;
            e.preventDefault();
            const wsRect = workspaceLeft.getBoundingClientRect();
            const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

            let newX = clientX - wsRect.left - offsetX;
            let newY = clientY - wsRect.top - offsetY;

            // 스냅(자석) 로직
            const allBlocks = workspaceLeft.querySelectorAll('.block');
            for (let b of allBlocks) {
                if (b === currentBlock) continue;
                const bRect = { left: parseFloat(b.style.left), top: parseFloat(b.style.top), width: b.offsetWidth, height: b.offsetHeight };
                const cRect = { left: newX, top: newY, width: currentBlock.offsetWidth, height: currentBlock.offsetHeight };

                if (cRect.height === bRect.height) {
                    if (Math.abs((cRect.left + cRect.width) - bRect.left) < SNAP_THRESHOLD && Math.abs(cRect.top - bRect.top) < SNAP_THRESHOLD) {
                        newX = bRect.left - cRect.width + 2; newY = bRect.top; break;
                    }
                    if (Math.abs(cRect.left - (bRect.left + bRect.width)) < SNAP_THRESHOLD && Math.abs(cRect.top - bRect.top) < SNAP_THRESHOLD) {
                        newX = bRect.left + bRect.width - 2; newY = bRect.top; break;
                    }
                }
                if (cRect.width === bRect.width) {
                    if (Math.abs((cRect.top + cRect.height) - bRect.top) < SNAP_THRESHOLD && Math.abs(cRect.left - bRect.left) < SNAP_THRESHOLD) {
                        newX = bRect.left; newY = bRect.top - cRect.height + 2; break;
                    }
                    if (Math.abs(cRect.top - (bRect.top + bRect.height)) < SNAP_THRESHOLD && Math.abs(cRect.left - bRect.left) < SNAP_THRESHOLD) {
                        newX = bRect.left; newY = bRect.top + bRect.height - 2; break;
                    }
                }
            }

            if (newX < 0) newX = 0;
            if (newY < 0) newY = 0;
            if (newX + currentBlock.offsetWidth > wsRect.width) newX = wsRect.width - currentBlock.offsetWidth;
            if (newY + currentBlock.offsetHeight > wsRect.height) newY = wsRect.height - currentBlock.offsetHeight;

            currentBlock.style.left = newX + 'px';
            currentBlock.style.top = newY + 'px';

            // 쓰레기통 호버 감지
            const trashRect = trashZone.getBoundingClientRect();
            if (clientX >= trashRect.left && clientX <= trashRect.right && clientY >= trashRect.top && clientY <= trashRect.bottom) {
                trashZone.classList.add('active');
            } else {
                trashZone.classList.remove('active');
            }

            // 드래그 중 실시간 결과 업데이트
            updateResult();
        }

        document.addEventListener('mousemove', dragMove);
        document.addEventListener('touchmove', dragMove, {passive: false});

        // ─── 드래그 종료 ───
        function dragEnd(e) {
            if (!isDragging || !currentBlock) return;

            if (trashZone.classList.contains('active')) {
                currentBlock.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
                currentBlock.style.transform = 'scale(0.3) rotate(20deg)';
                currentBlock.style.opacity = '0';
                const blockToRemove = currentBlock;
                setTimeout(() => {
                    blockToRemove.remove();
                    updateResult();
                }, 300);
                trashZone.classList.remove('active');
            }

            isDragging = false;
            currentBlock = null;
        }

        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        // ─── 모두 지우기 ───
        window.clearWorkspace = function() {
            workspaceLeft.querySelectorAll('.block').forEach(b => b.remove());
            updateResult();
        }

        // 초기 상태
        updateResult();
    </script>
</body>
</html>
