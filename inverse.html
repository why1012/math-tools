<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>역수 텀블링 시뮬레이터 (부호 분리형)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h2 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 15px; }

        /* 입력 영역 */
        .input-group {
            background: #eef2f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: inline-block;
        }
        input[type="text"] {
            width: 140px;
            font-size: 20px;
            text-align: center;
            padding: 8px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }

        /* 컨트롤 버튼 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            color: white;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-load { background-color: #95a5a6; }
        .btn-add-one { background-color: #9b59b6; animation: pulse 1.5s infinite; }
        .btn-tumble { background-color: #e67e22; }
        .btn-align { background-color: #2ecc71; }
        
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; animation: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 시각화 영역 */
        #display-area {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 3px dashed #bdc3c7;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 60px;
            font-weight: 900;
            color: #2c3e50;
            position: relative;
        }

        /* 앞으로 빠져나온 부호 영역 */
        #sign {
            margin-right: 15px;
            font-size: 70px;
            color: #e74c3c;
        }

        /* 분수 컨테이너 (우측 180도 회전용) */
        #fraction-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .tumbled {
            transform: rotate(180deg);
        }

        .num-wrapper, .den-wrapper {
            padding: 5px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70px;
        }
        
        .hidden-element {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .digit {
            transition: transform 0.6s ease, color 0.3s ease;
        }

        .aligned .digit {
            transform: rotate(-180deg);
            color: #e67e22; 
        }

        #fraction-line {
            width: 100%;
            height: 6px;
            background-color: #2c3e50;
            border-radius: 3px;
            transition: opacity 0.5s ease;
        }

        #message {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
            min-height: 30px;
            padding: 10px;
            border-radius: 8px;
            transition: opacity 0.3s;
        }
        .success-msg { color: #27ae60 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤸‍♂️ 역수 텀블링 시뮬레이터</h2>
    <div class="subtitle">오른쪽으로 180도 회전시켜 역수의 원리를 확인하세요!</div>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="예: +3/4, -5, 0" onkeypress="if(event.keyCode==13) loadFraction()">
        <button class="btn-load" onclick="loadFraction()">입력/초기화</button>
    </div>

    <div class="controls">
        <button id="btn-add-one" class="btn-add-one" onclick="makeDenominatorOne()" style="display: none;">💡 분모 1 만들기</button>
        <button id="btn-tumble" class="btn-tumble" onclick="tumble()" disabled>1. 우측으로 180도 회전</button>
        <button id="btn-align" class="btn-align" onclick="alignDigits()" disabled>2. 숫자 똑바로 정렬</button>
    </div>

    <div id="display-area">
        <div id="sign"></div>
        <div id="fraction-box">
            <div class="num-wrapper"><div class="digit" id="num">0</div></div>
            <div id="fraction-line"></div>
            <div class="den-wrapper" id="den-wrapper"><div class="digit" id="den">1</div></div>
        </div>
    </div>

    <div id="message"></div>
</div>

<script>
    let isZero = false;
    let fractionBox = document.getElementById('fraction-box');
    let signEl = document.getElementById('sign');
    let numEl = document.getElementById('num');
    let denEl = document.getElementById('den');
    let denWrapper = document.getElementById('den-wrapper');
    let fractionLine = document.getElementById('fraction-line');
    let msgEl = document.getElementById('message');
    
    let btnAddOne = document.getElementById('btn-add-one');
    let btnTumble = document.getElementById('btn-tumble');
    let btnAlign = document.getElementById('btn-align');

    // 1. 입력 및 파싱
    function loadFraction() {
        let val = document.getElementById('userInput').value.trim();
        if(!val) return;

        // 초기화
        fractionBox.classList.remove('tumbled');
        fractionBox.classList.remove('aligned');
        msgEl.innerText = "";
        msgEl.className = "";
        numEl.style.color = "";
        denEl.style.color = "";
        isZero = false;

        let signStr = "";
        
        // 양수(+), 음수(-) 기호 확인 및 분리 추출
        if (val.startsWith('-')) {
            signStr = "-";
            val = val.substring(1).trim();
        } else if (val.startsWith('+')) {
            signStr = "+";
            val = val.substring(1).trim();
        }

        signEl.innerText = signStr;

        // 분수인지 정수인지 판별
        if (val.includes('/')) {
            let parts = val.split('/');
            numEl.innerText = parts[0] ? parts[0].trim() : "0";
            denEl.innerText = parts[1] ? parts[1].trim() : "1";
            
            denWrapper.classList.remove('hidden-element');
            fractionLine.classList.remove('hidden-element');

            btnAddOne.style.display = 'none';
            setTimeout(() => {
                btnTumble.disabled = false;
                btnAlign.disabled = true;
            }, 500);

        } else {
            let n = val;
            // 0 처리 (0은 부호가 없으므로 기호 삭제)
            if (n === "0") {
                signEl.innerText = "";
                isZero = true;
            }

            numEl.innerText = n;
            denEl.innerText = "1"; 
            
            denWrapper.classList.add('hidden-element');
            fractionLine.classList.add('hidden-element');

            btnAddOne.style.display = 'inline-block';
            btnTumble.disabled = true;
            btnAlign.disabled = true;
            
            msgEl.innerText = "정수네요! 회전하기 전에 먼저 '분모 1 만들기'를 눌러주세요.";
            msgEl.style.color = "#7f8c8d";
        }
    }

    // 2. 정수일 때 분모 1 보이게 하기
    function makeDenominatorOne() {
        denWrapper.classList.remove('hidden-element');
        fractionLine.classList.remove('hidden-element');
        
        btnAddOne.style.display = 'none';
        btnTumble.disabled = false;
        
        msgEl.innerText = "좋습니다! 이제 분수 형태가 되었으니 회전시켜 보세요.";
        msgEl.style.color = "#2ecc71";
    }

    // 3. 텀블링
    function tumble() {
        fractionBox.classList.add('tumbled');
        btnTumble.disabled = true;
        
        setTimeout(() => {
            btnAlign.disabled = false;
            msgEl.innerText = "오른쪽으로 180도 회전했습니다! 숫자들을 똑바로 세워주세요.";
            msgEl.style.color = "#7f8c8d";
        }, 800);
    }

    // 4. 숫자 정렬
    function alignDigits() {
        fractionBox.classList.add('aligned');
        btnAlign.disabled = true;

        setTimeout(() => {
            if (isZero) {
                msgEl.className = "";
                msgEl.innerHTML = "앗! 분모가 <strong>0</strong>이 되었어요.<br>수학에서 0으로 나누는 것은 불가능하므로 <strong>0의 역수는 없습니다!</strong>";
            } else {
                msgEl.className = "success-msg";
                let s = signEl.innerText;
                let finalNum = denEl.innerText; 
                let finalDen = numEl.innerText; 
                msgEl.innerText = `완성! 처음 수의 역수는 ${s}${finalNum}/${finalDen} 입니다.`;
            }
        }, 600);
    }

    // 초기 화면 세팅
    document.getElementById('userInput').value = "+3/4";
    loadFraction();
</script>

</body>
</html>
