<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3점 슛! 식의 값 구하기 (3D Texture Mod)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; touch-action: none; 
            background-color: #080d14; 
            display: flex; align-items: center; justify-content: center;
        }

        #game-container {
            position: relative;
            width: 1200px;
            height: 675px;
            background-color: #0b111a;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #game-ui { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 5; 
            background: rgba(10, 15, 26, 0.8); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.1);
            width: 240px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        
        #btn-fix-angle, #btn-throw { 
            width: 100%; padding: 14px; font-size: 16px; font-weight: 800; border: none; border-radius: 16px; 
            cursor: pointer; user-select: none; transition: all 0.15s; letter-spacing: -0.5px;
        }
        #btn-fix-angle { background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; box-shadow: 0 4px 0 #0369a1; }
        #btn-throw { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; box-shadow: 0 4px 0 #c2410c; display: none; }
        #btn-throw:disabled { background: #334155; box-shadow: 0 4px 0 #1e293b; color: #94a3b8; cursor: not-allowed; display: block; }
        
        .power-bar-bg { width: 100%; height: 8px; background-color: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; }
        .power-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #ef4444); transition: width 0.05s linear; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .box-panel { background: rgba(255,255,255,0.95); padding: 40px; border-radius: 24px; text-align: center; max-width: 450px; }
        .box-panel input { padding: 10px; font-size: 22px; width: 90px; text-align: center; border: 3px solid #b0bec5; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-overlay" class="overlay">
            <div class="box-panel">
                <h2 style="font-size: 30px; color: #d84315;">🏀 60초 타임어택 3점 슛!</h2>
                <p>성공한 골의 개수를 <math><mi>&#x1D4B3;</mi></math>라고 할 때,<br>최종 점수 <math><mn>3</mn><mi>&#x1D4B3;</mi></math>의 값을 구해보세요!</p>
                <button onclick="startGame()" style="padding: 14px 30px; background: #ff5722; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:bold;">게임 시작!</button>
            </div>
        </div>

        <div id="game-ui">
            <div class="control-group">
                <button id="btn-fix-angle" onclick="fixAngle()">🎯 조준선 멈추기</button>
                <button id="btn-throw" disabled>🏀 누르고 있으면 힘이 모입니다!</button>
            </div>
            <div class="power-bar-bg">
                <div class="power-bar-fill" id="power-fill"></div>
            </div>
        </div>

        <div id="quiz-overlay" class="overlay" style="display:none;">
            <div id="quiz-step-1" class="box-panel">
                <h2>⏱️ 경기 종료!</h2>
                <p>성공한 슛의 개수 <strong style="color:#1976d2; font-size: 24px;">𝓍</strong>는 얼마일까요?</p>
                <div style="font-size: 26px; margin: 20px 0;">𝓍 = <input type="number" id="param-x-input" value="0"></div>
                <button onclick="confirmX()" style="padding:10px 20px; background:#0288d1; color:white; border:none; border-radius:8px; cursor:pointer;">확인</button>
            </div>
            <div id="quiz-step-2" class="box-panel" style="display:none;">
                <h2>🎯 식의 값 구하기</h2>
                <p>3 × <span id="substituted-x" style="color:#1976d2; font-weight:bold;"></span> = ?</p>
                <div style="font-size: 26px; margin: 20px 0;"><input type="number" id="final-score-input" placeholder="정답"></div>
                <button onclick="checkQuiz2()" style="padding:10px 20px; background:#f57c00; color:white; border:none; border-radius:8px; cursor:pointer;">정답 확인</button>
            </div>
            <div id="quiz-step-3" class="box-panel" style="display:none;">
                <h2>🎉 완벽합니다!</h2>
                <p>대입을 통해 식의 값을 구하는 법을 마스터했네요!</p>
                <button onclick="location.reload()" style="padding:10px 20px; background:#4caf50; color:white; border:none; border-radius:8px; cursor:pointer;">다시 하기</button>
            </div>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Events, Composite, Body } = Matter;
        const engine = Engine.create();
        const container = document.getElementById('game-container');
        const width = 1200; const height = 675;

        const render = Render.create({
            element: container,
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        function resizeGame() {
            const scale = Math.min(window.innerWidth / width, window.innerHeight / height, 1);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeGame);
        resizeGame();

        const stadiumImg = new Image(); stadiumImg.src = './stadium_bg.png';
        const floorImg = new Image(); floorImg.src = './court_floor.png';
        const ballImg = new Image(); ballImg.src = './basketball.png';

        let gameStarted = false; let gameEnded = false; let timeLeft = 60; let x_score = 0;
        let isShooting = false; let ballActive = false; let isAngleFixed = false;
        let power = 0; let angleDeg = 45; let angleDir = 1;

        const hoopX = width - 200; const hoopY = height - 320;
        const redSensor = Bodies.rectangle(hoopX - 15, hoopY + 16, 70, 8, { isStatic: true, isSensor: true, render: { visible: false } });
        World.add(engine.world, [
            Bodies.rectangle(175, height - 10, 350, 20, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width - 100, height - 10, 200, 20, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(hoopX + 65, hoopY - 50, 15, 150, { isStatic: true, render: { visible: false } }),
            redSensor
        ]);

        let ball;
        function createBall() {
            ball = Bodies.circle(150, height - 120, 18, { restitution: 0.75, render: { visible: false } });
            World.add(engine.world, ball);
        }
        createBall();

        function drawStadiumAndCrowd(ctx) {
            if (!stadiumImg.complete) return;
            ctx.drawImage(stadiumImg, 0, 0, width, height);
            
            // 전광판
            ctx.fillStyle = 'rgba(15, 23, 42, 0.9)';
            ctx.beginPath(); ctx.roundRect(width/2 - 170, 20, 340, 100, 16); ctx.fill();

            ctx.textAlign = 'center'; ctx.fillStyle = '#94a3b8'; ctx.font = '800 13px Pretendard';
            ctx.fillText('COUNTDOWN', width/2 - 85, 48); ctx.fillText('SCORE', width/2 + 85, 48);

            ctx.fillStyle = timeLeft <= 10 ? '#ef4444' : '#f97316'; ctx.font = '900 42px Pretendard';
            ctx.fillText(timeLeft, width/2 - 85, 95);

            // 💡 𝓍 = 0 스타일 (필기체 및 소괄호 제거)
            ctx.save();
            ctx.textAlign = 'right'; ctx.font = 'italic 900 44px "Times New Roman"'; ctx.fillStyle = '#facc15';
            ctx.fillText('\uD835\uDCE7', width/2 + 75, 95); // 𝓍 필기체

            ctx.textAlign = 'left'; ctx.font = '900 38px Pretendard'; ctx.fillStyle = '#fff';
            ctx.fillText(' = ' + x_score, width/2 + 75, 93);
            ctx.restore();
        }

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            drawStadiumAndCrowd(ctx);
            if (floorImg.complete) ctx.drawImage(floorImg, 0, height - 20, width, 20);
            if (!isShooting) {
                ctx.beginPath(); ctx.moveTo(ball.position.x, ball.position.y);
                const rad = -angleDeg * Math.PI/180;
                ctx.lineTo(ball.position.x + Math.cos(rad)*80, ball.position.y + Math.sin(rad)*80);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            }
            if (ball) {
                ctx.save(); ctx.translate(ball.position.x, ball.position.y); ctx.rotate(ball.angle);
                if (ballImg.complete) ctx.drawImage(ballImg, -18, -18, 36, 36);
                ctx.restore();
            }
        });

        Events.on(engine, 'beforeUpdate', () => {
            if (gameStarted && !gameEnded && !isShooting && !isAngleFixed) {
                angleDeg += 1.8 * angleDir;
                if (angleDeg >= 85 || angleDeg <= 15) angleDir *= -1;
            }
        });

        Events.on(engine, 'collisionStart', (e) => {
            e.pairs.forEach(p => {
                if ((p.bodyA === ball && p.bodyB === redSensor) || (p.bodyB === ball && p.bodyA === redSensor)) {
                    if (ball.velocity.y > 0) { x_score++; ballActive = false; }
                }
            });
        });

        window.startGame = () => { document.getElementById('start-overlay').style.display='none'; gameStarted=true; timerInterval = setInterval(() => { if(timeLeft>0) timeLeft--; else { clearInterval(timerInterval); gameEnded=true; document.getElementById('quiz-overlay').style.display='flex'; } }, 1000); };
        window.fixAngle = () => { isAngleFixed = true; document.getElementById('btn-fix-angle').style.display='none'; document.getElementById('btn-throw').style.display='block'; };
        
        const btn = document.getElementById('btn-throw');
        btn.onmousedown = () => { if(!isAngleFixed || isShooting) return; power=0; pressInterval = setInterval(() => { power = Math.min(power+2.5, 100); document.getElementById('power-fill').style.width = power+'%'; }, 20); };
        window.onmouseup = () => { if(!pressInterval) return; clearInterval(pressInterval); pressInterval=null; isShooting=true; Body.applyForce(ball, ball.position, { x: Math.cos(-angleDeg*Math.PI/180)*power*0.006, y: Math.sin(-angleDeg*Math.PI/180)*power*0.006 }); setTimeout(resetTurn, 3000); };

        function resetTurn() { Composite.remove(engine.world, ball); isShooting=false; isAngleFixed=false; document.getElementById('btn-fix-angle').style.display='block'; document.getElementById('btn-throw').style.display='none'; document.getElementById('power-fill').style.width='0%'; createBall(); }
        window.confirmX = () => { if(parseInt(document.getElementById('param-x-input').value) == x_score) { document.getElementById('quiz-step-1').style.display='none'; document.getElementById('quiz-step-2').style.display='block'; document.getElementById('substituted-x').innerText = x_score; } };
        window.checkQuiz2 = () => { if(parseInt(document.getElementById('final-score-input').value) == x_score*3) { document.getElementById('quiz-step-2').style.display='none'; document.getElementById('quiz-step-3').style.display='block'; } };

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
