<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3점 슛! 식의 값 구하기 (3D Texture Mod)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; touch-action: none; background-color: #0b111a; }
        canvas { display: block; width: 100% !important; height: 100% !important; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 💡 글래스모피즘 UI 패널 */
        #game-ui { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 5; 
            background: rgba(10, 15, 26, 0.75); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.1);
            width: 240px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .control-group { margin-bottom: 0; }
        
        #btn-fix-angle, #btn-throw { 
            width: 100%; padding: 14px; font-size: 16px; font-weight: 800; border: none; border-radius: 16px; 
            cursor: pointer; user-select: none; transition: all 0.15s; letter-spacing: -0.5px;
        }
        #btn-fix-angle {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%); color: white; 
            box-shadow: 0 4px 0 #0369a1, 0 8px 16px rgba(14, 165, 233, 0.3);
        }
        #btn-fix-angle:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }
        #btn-fix-angle:disabled { display: none; }

        #btn-throw {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; 
            box-shadow: 0 4px 0 #c2410c, 0 8px 16px rgba(249, 115, 22, 0.3);
            display: none;
        }
        #btn-throw:active { transform: scale(0.98); }
        #btn-throw:disabled { background: #334155; box-shadow: 0 4px 0 #1e293b; color: #94a3b8; cursor: not-allowed; transform: none; display: block; }
        
        .power-bar-bg { width: 100%; height: 8px; background-color: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .power-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #10b981, #f59e0b, #ef4444); transition: width 0.05s linear; }
